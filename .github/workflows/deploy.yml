name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  deploy:
    name: Deploy to Production
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            if [ ! -d /opt/prime-capital ]; then
              git clone https://github.com/ADGO-et/prime-capital.git /opt/prime-capital
            fi
            cd /opt/prime-capital
            git fetch origin main
            git reset --hard origin/main
            docker build -t prime-capital:latest .
            docker rm -f prime-capital 2>/dev/null || true
            docker run -d \
              --name prime-capital \
              --restart always \
              -p 3034:3000 \
              prime-capital:latest
            echo "Deployed at $(date)"
